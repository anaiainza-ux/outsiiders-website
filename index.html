
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OUTSIIIDERS 2026 | Innovación en Marcha</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --base-blue: #002B5B; /* Darker base to make the shader pop */
        }

        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
            background-color: var(--base-blue);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        .font-mono-custom {
            font-family: 'Courier Prime', monospace;
        }

        h1, h2, h3, h4 {
            font-family: 'Poppins', sans-serif;
        }

        /* Ambient Background inspired by the reference images */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            background: #002B5B;
            overflow: hidden;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.9;
            mix-blend-mode: normal;
            animation: float 20s infinite alternate ease-in-out;
        }

        /* Specifically matching the "Splashes" from the user image */
        .blob-left {
            width: 70vw;
            height: 70vw;
            background: radial-gradient(circle, #ED593B 0%, rgba(237, 89, 59, 0) 75%);
            top: -10%;
            left: -15%;
            opacity: 0.4;
        }

        .blob-center {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #FFC759 0%, rgba(255, 199, 89, 0) 75%);
            top: 5%;
            left: 5%;
            opacity: 0.3;
            animation-delay: -5s;
        }

        .blob-right {
            width: 60vw;
            height: 60vw;
            background: radial-gradient(circle, #ED593B 0%, rgba(237, 89, 59, 0) 75%);
            bottom: -20%;
            right: -15%;
            opacity: 0.3;
            animation-delay: -10s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.1); }
        }

        /* Grain texture overlay matching the reference image noise */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.18;
            z-index: 1000;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Glassmorphism utility */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "@react-three/fiber": "https://esm.sh/@react-three/fiber@^9.5.0",
    "@react-three/drei": "https://esm.sh/@react-three/drei@^10.7.7",
    "three": "https://esm.sh/three@^0.182.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="ambient-bg">
        <div class="ambient-blob blob-left"></div>
        <div class="ambient-blob blob-center"></div>
        <div class="ambient-blob blob-right"></div>
    </div>
    <div class="noise-overlay"></div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
